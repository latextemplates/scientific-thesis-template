# heylogs configuration — https://github.com/nbbrd/heylogs
# These CHANGELOGs use CalVer (version == date) with years of history and
# cross-repo references, which the following rules can't model. Keep the rest on.
forge=github
rules=all-h2-contain-a-version:OFF,date-displayed:OFF,forge-ref:OFF,unknown-link-type:OFF,no-empty-release:OFF,linkable:OFF
